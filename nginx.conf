worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream web-api {
        server webapp:3000;
    }

    server {
        listen 80;
        server_name localhost;
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/ssl/certs/localhost.crt;
        ssl_certificate_key /etc/ssl/private/localhost.key;

        location / {
            proxy_pass http://web-api;
        }
    }
}
