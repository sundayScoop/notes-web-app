apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-deployment
  labels:
    app: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: notes-web-app
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: WEB_APP_NOTES_MONGODB_HOST
              value: "mongo-service:27017"
            - name: WEB_APP_NOTES_MONGODB_DATABASE
              value: "notesdb"
